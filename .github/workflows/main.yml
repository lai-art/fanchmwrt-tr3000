name: 编译 FanchmWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      target:
        description: '选择编译目标'
        required: true
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - tr3000-256m        # 添加 TR3000 选项

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt/
  REPO_BRANCH: fanchmwrt-24.10.4
  
  # ==========================================
  # 修改1：根据目标动态选择配置文件（需要配合步骤中的逻辑）
  # ==========================================
  # 默认配置，实际在步骤中会被覆盖
  CONFIG_FILE: FanchmWrt/fanchmwrt.config
  
  FEEDS_CONF: FanchmWrt/feeds.conf.default
  DIY_P1_SH: FanchmWrt/diy-part1.sh
  DIY_P2_SH: FanchmWrt/diy-part2.sh
  
  # 设备类型：x86 或 embedded（影响后续处理）
  DEVICE_TYPE: x86
  
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检测(Checkout)
      uses: actions/checkout@main

    # ==========================================
    # 修改2：新增步骤 - 根据输入选择目标配置
    # ==========================================
    - name: 选择编译目标(Select target)
      run: |
        TARGET="${{ github.event.inputs.target }}"
        # 如果没有手动选择（push触发），默认 x86-64
        if [ -z "$TARGET" ]; then
          TARGET="x86-64"
        fi
        echo "SELECTED_TARGET=$TARGET" >> $GITHUB_ENV
        echo "编译目标: $TARGET"
        
        # 根据目标设置配置路径和设备类型
        if [ "$TARGET" = "tr3000-256m" ]; then
          echo "CONFIG_FILE=FanchmWrt/configs/tr3000-256m.config" >> $GITHUB_ENV
          echo "DEVICE_TYPE=embedded" >> $GITHUB_ENV
          echo "FIRMWARE_PATTERN=openwrt-mediatek-filogic-cudy_tr3000-v1" >> $GITHUB_ENV
        else
          echo "CONFIG_FILE=FanchmWrt/fanchmwrt.config" >> $GITHUB_ENV
          echo "DEVICE_TYPE=x86" >> $GITHUB_ENV
          echo "FIRMWARE_PATTERN=openwrt-x86-64-generic" >> $GITHUB_ENV
        fi

    - name: 初始化环境(Initialization environment)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源代码(Clone source code)
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH fanchmwrt
        ln -sf /workdir/fanchmwrt $GITHUB_WORKSPACE/fanchmwrt

    - name: 加载自定义订阅源(Load custom feeds)
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF fanchmwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd fanchmwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新软件源(Update feeds)
      run: cd fanchmwrt && ./scripts/feeds update -a

    - name: 安装软件源(Install feeds)
      run: cd fanchmwrt && ./scripts/feeds install -a

    # ==========================================
    # 修改3：使用动态配置路径，并添加递归依赖修复
    # ==========================================
    - name: 加载自定义配置(Load custom configuration)
      run: |
        # 使用步骤2中设置的配置路径
        CONFIG_PATH="${{ env.CONFIG_FILE }}"
        
        [ -e FanchmWrt/files ] && mv FanchmWrt/files fanchmwrt/files
        
        if [ -e "$CONFIG_PATH" ]; then
          cp "$CONFIG_PATH" fanchmwrt/.config
          echo "使用配置: $CONFIG_PATH"
        else
          echo "错误：找不到配置文件 $CONFIG_PATH"
          exit 1
        fi
        
        chmod +x $DIY_P2_SH
        cd fanchmwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # ==========================================
        # 修改4：如果是 TR3000，自动修复递归依赖
        # ==========================================
        if [ "${{ env.SELECTED_TARGET }}" = "tr3000-256m" ]; then
          echo "修复 TR3000 递归依赖..."
          cat >> .config << 'EOF'
          # 自动修复递归依赖
          # CONFIG_PACKAGE_luci-app-fchomo is not set
          # CONFIG_PACKAGE_nikki is not set
          # CONFIG_PACKAGE_luci-app-homeproxy is not set
          # CONFIG_PACKAGE_sing-box-tiny is not set
          # CONFIG_PACKAGE_momo is not set
          # CONFIG_PACKAGE_natmap is not set
          # CONFIG_PACKAGE_luci-app-nat6-helper is not set
          # CONFIG_PACKAGE_luci-app-momo is not set
          # CONFIG_PACKAGE_luci-app-alist is not set
          # CONFIG_PACKAGE_mentohust is not set
          # CONFIG_PACKAGE_luci-app-torbp is not set
          # CONFIG_PACKAGE_tor is not set
          # CONFIG_PACKAGE_luci-app-dogcom is not set
          # CONFIG_PACKAGE_dogcom is not set
          # CONFIG_PACKAGE_luci-app-gowebdav is not set
          # CONFIG_PACKAGE_gowebdav is not set
          # CONFIG_PACKAGE_luci-app-nginx-pingos is not set
          # CONFIG_PACKAGE_luci-app-bandwidthd is not set
          # CONFIG_PACKAGE_bandwidthd is not set
          # CONFIG_PACKAGE_amule is not set
          # CONFIG_PACKAGE_libcryptopp is not set
          EOF
        fi

    - name: 下载软件包(Download package)
      id: package
      run: |
        cd fanchmwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件(Compile the firmware)
      id: compile
      run: |
        cd fanchmwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        
        # ==========================================
        # 修改5：改进设备名提取，支持多种平台
        # ==========================================
        if [ "${{ env.DEVICE_TYPE }}" = "x86" ]; then
          # x86 平台
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        else
          # 嵌入式平台（如 TR3000）
          grep '^CONFIG_TARGET_DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME || \
          echo "tr3000-v1" > DEVICE_NAME
        fi
        
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 检查空间使用情况(Check space usage)
      if: (!cancelled())
      run: df -hT

    - name: 上传 Bin 目录(Upload bin directory)
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: fanchmwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: fanchmwrt/bin

    - name: 整理文件(Organize files)
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd fanchmwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        
        # 显示找到的固件文件（调试用）
        echo "找到的固件文件："
        ls -lh *.bin 2>/dev/null || ls -lh *.img* 2>/dev/null || echo "警告：未找到标准固件文件"
        
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录(Upload firmware directory)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: FanchmWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签(Generate release tag)
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        
        # ==========================================
        # 修改6：动态生成发布说明
        # ==========================================
        TARGET="${{ env.SELECTED_TARGET }}"
        DEVICE="${{ env.DEVICE_NAME }}"
        
        echo "## FanchmWrt 固件编译自动发布" > release.txt
        echo "- 编译时间：$(date +"%Y-%m-%d %H:%M:%S")" >> release.txt
        echo "- 目标平台：$TARGET" >> release.txt
        echo "- 设备型号：${DEVICE:-未知}" >> release.txt
        
        if [ "$TARGET" = "tr3000-256m" ]; then
          echo "- 固件类型：Cudy TR3000 256M" >> release.txt
          echo "- 刷机说明：" >> release.txt
          echo "  - 首次刷机使用 *-factory.bin" >> release.txt
          echo "  - 升级使用 *-sysupgrade.bin" >> release.txt
          echo "  - **请勿保留配置升级**" >> release.txt
        else
          echo "- 固件名称：FanchmWrt-x86-64-generic-squashfs-combined-efi.img.gz" >> release.txt
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT

    # ==========================================
    # 修改7：改进重命名逻辑，支持多平台
    # ==========================================
    - name: 重命名固件文件(Rename firmware file)
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        cd "${{ env.FIRMWARE }}"
        PATTERN="${{ env.FIRMWARE_PATTERN }}"
        
        # 查找匹配的固件文件
        for file in $PATTERN*.bin $PATTERN*.img.gz; do
          [ -e "$file" ] || continue
          
          # 生成新文件名（将 openwrt 替换为 FanchmWrt）
          newname=$(echo "$file" | sed 's/openwrt-/FanchmWrt-/')
          
          if [ "$file" != "$newname" ]; then
            mv "$file" "$newname"
            echo "✅ 重命名: $file -> $newname"
          fi
        done
        
        # 显示最终文件列表
        echo "最终固件文件："
        ls -lh FanchmWrt-* 2>/dev/null || ls -lh openwrt-* 2>/dev/null || echo "⚠️ 未找到固件文件"

    # ==========================================
    # 修改8：动态文件匹配，支持 TR3000 的多种固件
    # ==========================================
    - name: 上传固件到 Release（Upload firmware to release）
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/FanchmWrt-*.bin
          ${{ env.FIRMWARE }}/FanchmWrt-*.img.gz
          ${{ env.FIRMWARE }}/sha256sums
        overwrite: true

    - name: 删除运行的工作流(Delete workflow runs)
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 删除旧版本(Remove old Releases)
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
