name: 编译 FanchmWrt

on:
  repository_dispatch:
  workflow_dispatch:
# 核心新增：配置GITHUB_TOKEN权限
permissions:
  contents: write  # 授予创建/修改Release的权限
  actions: write   # 可选：如果需要删除旧Workflow Runs，补充这个权限
env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt/
  REPO_BRANCH: fanchmwrt-24.10.4
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: /FanchmWrt/.config
  DIY_P1_SH: /FanchmWrt/diy-part1.sh
  DIY_P2_SH: /FanchmWrt/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检测(Checkout)
      uses: actions/checkout@main

    - name: 初始化环境(Initialization environment)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
    - name: 克隆源代码(Clone source code)
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH fanchmwrt
        ln -sf /workdir/fanchmwrt $GITHUB_WORKSPACE/fanchmwrt
    - name: 加载自定义订阅源(Load custom feeds)
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF fanchmwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd fanchmwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
    - name: 更新软件源(Update feeds)
      run: cd fanchmwrt && ./scripts/feeds update -a

    - name: 安装软件源(Install feeds)
      run: cd fanchmwrt && ./scripts/feeds install -a

    - name: 加载自定义配置(Load custom configuration)
      run: |
        [ -e files ] && mv files fanchmwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE fanchmwrt/.config
        chmod +x $DIY_P2_SH
        cd fanchmwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
    - name: 下载软件包(Download package)
      id: package
      run: |
        cd fanchmwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
    - name: 编译固件(Compile the firmware)
      id: compile
      run: |
        cd fanchmwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
    - name: 检查空间使用情况(Check space usage)
      if: (!cancelled())
      run: df -hT

    - name: 上传 Bin 目录(Upload bin directory)
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: fanchmwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: fanchmwrt/bin

    - name: 整理文件(Organize files)
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd fanchmwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
    - name: 上传固件目录(Upload firmware directory)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: FanchmWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签(Generate release tag)
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        # 修复空release.txt问题：补充基础描述
        echo "## FanchmWrt 固件编译自动发布" > release.txt
        echo "- 编译时间：$(date +"%Y-%m-%d %H:%M:%S")" >> release.txt
        echo "- 设备型号：${{ env.DEVICE_NAME }}" >> release.txt
        echo "- 固件名称：FanchmWrt-x86-64-generic-squashfs-combined-efi.img.gz" >> release.txt
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT
        
    # 修复缩进 + 优化重命名逻辑：精准匹配原文件，避免批量错误重命名
    - name: 重命名固件文件(Rename firmware file)
      if: steps.tag.outputs.status == 'success' && !cancelled()
      run: |
        # 先检查原文件是否存在，避免重命名失败
        if [ -f "${{ env.FIRMWARE }}/openwrt-x86-64-generic-squashfs-combined-efi.img.gz" ]; then
          mv "${{ env.FIRMWARE }}/openwrt-x86-64-generic-squashfs-combined-efi.img.gz" "${{ env.FIRMWARE }}/FanchmWrt-x86-64-generic-squashfs-combined-efi.img.gz"
          echo "✅ 固件文件重命名成功"
        else
          echo "⚠️ 原固件文件不存在，跳过重命名"
        fi
          
    - name: 上传固件到 Release（Upload firmware to release）
      uses: softprops/action-gh-release@v1  # 替换为稳定版v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        # 匹配重命名后的文件，确保上传正确的文件名
        files: |
          ${{ env.FIRMWARE }}/FanchmWrt-x86-64-generic-squashfs-combined-efi.img.gz
          ${{ env.FIRMWARE }}/sha256sums
        overwrite: true  # 可选：如果重复打标签，允许覆盖

    - name: 删除运行的工作流(Delete workflow runs)
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: 删除旧版本(Remove old Releases)
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
